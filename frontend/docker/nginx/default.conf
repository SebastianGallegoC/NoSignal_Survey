# Tras proxy inverso (Traefik): usar cabeceras enviadas por el proxy; si faltan, $scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Chunks de Vite: si falta el archivo (deploy viejo/nuevo mezclado), devolver 404 real.
    # Sin esto, try_files de / entrega index.html y el navegador falla con "MIME type text/html".
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
